name: Validate and Auto-merge Allowed PRs

on:
  pull_request:
    branches:
      - release
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  prepare:
    name: Detect Template and Label
    runs-on: ubuntu-latest
    if: github.repository == 'AnatomicMaps/vagus-nerve-flatmap'
    outputs:
      should_auto_merge: ${{ steps.check.outputs.match }}
    steps:
      - name: Check for template or existing label
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const hasFingerprint = body.includes("fingerprint: auto-merge-template");
            const hasLabel = pr.labels.some(l => l.name === 'auto-merge');

            if (hasFingerprint || hasLabel) {
              console.log("✅ Auto-merge criteria met (Template or Label present).");
              core.setOutput("match", "true");
              
              // If it has the fingerprint but not the label yet, add it
              if (hasFingerprint && !hasLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['auto-merge']
                });
              }
            } else {
              console.log("ℹ️ No auto-merge criteria detected.");
              core.setOutput("match", "false");
            }

  restrict:
    name: Check file restrictions
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install minimatch

      - name: Restrict changed files to allowed paths
        id: validate
        env:
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          node <<'EOF'
          const minimatch = require('minimatch');
          const changed = process.env.CHANGED.split(/\s+/);
          const allowed = ["description.json", "manifest.json", "properties.json", "vagus.svg"];
          const disallowed = changed.filter(file => file.trim() !== "" && 
            !allowed.some(pattern => minimatch.minimatch(file, pattern))
          );
          if (disallowed.length > 0) {
            console.log("❌ Disallowed files:");
            disallowed.forEach(f => console.log(`- ${f}`));
            process.exit(1);
          }
          console.log("✅ All changed files are within allowed paths.");
          EOF

  automerge:
    name: Attempt automatic merge
    runs-on: ubuntu-latest
    needs: [prepare, restrict]
    # Only run if the restrict job passed AND the template was detected
    if: |
      always() && 
      needs.restrict.result == 'success' && 
      needs.prepare.outputs.should_auto_merge == 'true'

    steps:
      - name: Auto-merge
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;
            
            const maxRetries = 3;
            let retryCount = 0;
            let pr;
            let mergeableState = false;

            do {
              pr = await github.rest.pulls.get({ owner, repo, pull_number: number });
              if (pr.data.mergeable) {
                mergeableState = true
                break;
              }
              
              await new Promise(r => setTimeout(r, 5000));
              retryCount++;
            } while (retryCount < maxRetries);

            if (mergeableState) {
              try {
                await github.rest.pulls.merge({
                  owner, repo, pull_number: number, merge_method: "merge"
                });
                console.log("✅ PR automatically merged.");
              } catch (e) {
                console.error("❌ Merge failed:", e);
                process.exit(1)
              }
            } else {
              console.error("❌ Code changes not in a mergeable state.")
              process.exit(1)
            }
