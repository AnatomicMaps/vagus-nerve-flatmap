name: Validate and Auto-merge Allowed PRs

on:
  # Using pull_request_target grants Write permissions for forks
  pull_request_target:
    branches:
      - release
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: write

jobs:
  prepare:
    name: Detect Template and Label
    runs-on: ubuntu-latest
    if: github.repository == 'AnatomicMaps/vagus-nerve-flatmap'
    outputs:
      should_auto_merge: ${{ steps.check.outputs.match }}
    steps:
      - name: Check for template or existing label
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const hasFingerprint = body.includes("fingerprint: auto-merge-template");
            const hasLabel = pr.labels.some(l => l.name === 'auto-merge');
            if (hasFingerprint || hasLabel) {
              core.setOutput("match", "true");
              if (hasFingerprint && !hasLabel) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: ['auto-merge']
                });
              }
            } else {
              core.setOutput("match", "false");
            }
  restrict:
    name: Check file restrictions
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout Base Branch (Release)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Fetch PR Changes
        run: |
          git fetch origin +refs/pull/${{ github.event.pull_request.number }}/merge:pr-content
          git checkout pr-content
      - name: Install dependencies
        run: npm install minimatch

      - name: Restrict changed files
        id: validate
        run: |
          # Use git diff against the base branch to see what the PR changed
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD | tr '\n' ' ')
          
          node <<EOF
          const minimatch = require('minimatch');
          const changed = "$CHANGED_FILES".split(/\s+/);
          const allowed = ["description.json", "manifest.json", "properties.json", "vagus.svg"];
          const disallowed = changed.filter(file => file.trim() !== "" && 
            !allowed.some(pattern => minimatch.minimatch(file, pattern))
          );
          if (disallowed.length > 0) {
            console.log("❌ Disallowed files: " + disallowed.join(", "));
            process.exit(1);
          }
          console.log("✅ Validation passed.");
          EOF
  automerge:
    name: Attempt automatic merge
    runs-on: ubuntu-latest
    needs: [prepare, restrict]
    if: |
      always() && 
      needs.restrict.result == 'success' && 
      needs.prepare.outputs.should_auto_merge == 'true'
    steps:
      - name: Debug Token Permissions
        run: |
          echo "Checking permissions for: $(gh auth setup-token && gh api user -q .login)"
          echo "--- Scopes ---"
          # This will show you exactly what scopes the token has
          gh api -i / | grep -i "x-accepted-github-permissions" || true
          echo "--- Test Mergeability ---"
          # This tests the merge endpoint without actually merging (using a GET)
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.mergeable_state'
          
      - name: Auto-merge via API
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            await new Promise(r => setTimeout(r, 5000));
            const pr = await github.rest.pulls.get({ owner, repo, pull_number: number });
            const mergeable = pr.data.mergeable
            if (!mergeable) {
              console.error("❌ Code changes not in a mergeable state.")
              process.exit(1)
            }
            
            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                merge_method: "merge"
              });
              console.log("✅ Successfully merged fork PR.");
            } catch (error) {
              console.error("❌ Merge failed:")
              console.error(error.message);
              process.exit(1);
            }
            
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v4
        # Use this to keep the session alive even if previous steps failed
        if: always()
        
