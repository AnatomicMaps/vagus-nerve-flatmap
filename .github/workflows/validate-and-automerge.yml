name: Validate and Auto-merge Allowed PRs

on:
  pull_request:
    branches:
      - release

permissions:
  pull-requests: write
  contents: write

jobs:
  restrict:
    name: Check file restrictions
    runs-on: ubuntu-latest
    if: github.repository == 'AnatomicMaps/vagus-nerve-flatmap'

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for diffing against base

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install minimatch

      - name: Restrict changed files to allowed paths
        id: validate
        env:
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          node <<'EOF'
          const minimatch = require('minimatch');
          const changed = process.env.CHANGED.split(/\s+/);
          const allowed = ["description.json", "manifest.json", "properties.json", "vagus.svg"];

          const disallowed = changed.filter(file => file.trim() !== "" &&
            !allowed.some(pattern => minimatch.minimatch(file, pattern))
          );

          if (disallowed.length > 0) {
            console.log("❌ Disallowed files:");
            disallowed.forEach(f => console.log(`- ${f}`));
            process.exit(1); // Fail this job
          }

          console.log("✅ All changed files are within allowed paths.");
          EOF

  automerge:
    name: Attempt automatic merge
    runs-on: ubuntu-latest
    needs: restrict
    if: needs:restrict.result == 'success'

    steps:
      - name: Auto-merge
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;

            const maxRetries = 5;
            let retryCount = 0;
            let pr;
            let mergeableState;

            do {
              // Re-fetch to get up-to-date mergeable_state
              pr = await github.rest.pulls.get({ owner, repo, pull_number: number });
              mergeableState = pr.data.mergeable_state;

              if (mergeableState === 'clean') {
                console.log("✅ PR mergeable state is clean.");
                break;
              }

              if (mergeableState === 'dirty' || mergeableState === 'conflicting') {
                console.log("❌ PR has merge conflicts (or is currently dirty). Cannot auto-merge.");
                return;
              }

              console.log(`⏱️ PR mergeable state is ${mergeableState}. Retrying... (${retryCount + 1}/${maxRetries})`);
              await new Promise(resolve => setTimeout(resolve, 5000)); // Wait 5 seconds
              retryCount++;

            } while (retryCount < maxRetries);

            if (mergeableState !== 'clean') {
               console.log(`❌ Failsafe: PR mergeable state is still ${mergeableState}. Skipping merge.`);
               return;
            }

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.data.head.sha,
            });

            const currentWorkflowName = 'Validate and Auto-merge Allowed PRs';

            const filteredCheckRuns = checks.data.check_runs.filter(run => {
              // Wait for all checks EXCEPT those generated by THIS workflow
              return run.name !== currentWorkflowName;
            });

            if (filteredCheckRuns.length === 0) {
              console.log("⚠️ No other status checks were found. Proceeding with cautious merge.");
            } else {
              const allPassed = filteredCheckRuns.every(run => run.conclusion === "success");

              if (!allPassed) {
                console.log("❌ Not all OTHER required checks (outside this workflow) have passed.");
                return;
              }
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: number,
                merge_method: "merge", 
              });
              console.log("✅ PR automatically merged.");
            } catch (error) {
              console.error("❌ Failed to merge the PR:", error);
            }
